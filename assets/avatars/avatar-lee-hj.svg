<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1a1a2e" stroke="#ff3030" stroke-width="1.5" opacity="0.6"/>
  <!-- Body/Blouse -->
  <path d="M30 105 C30 82, 42 72, 60 70 C78 72, 90 82, 90 105" fill="#3a2840"/>
  <!-- V-neck -->
  <path d="M50 72 L60 82 L70 72" fill="none" stroke="#4a3850" stroke-width="2"/>
  <!-- Neck -->
  <rect x="54" y="62" width="12" height="12" rx="3" fill="#f5d8b8"/>
  <!-- Face -->
  <ellipse cx="60" cy="45" rx="21" ry="24" fill="#f5d8b8"/>
  <!-- Hair - long, wavy -->
  <path d="M38 42 C38 20, 46 12, 60 11 C74 12, 82 20, 82 42 C82 30, 76 17, 60 15 C44 17, 38 30, 38 42Z" fill="#1a0a00"/>
  <!-- Long hair sides -->
  <path d="M36 42 C34 55, 33 68, 36 80 C38 72, 37 58, 38 42Z" fill="#1a0a00"/>
  <path d="M84 42 C86 55, 87 68, 84 80 C82 72, 83 58, 82 42Z" fill="#1a0a00"/>
  <!-- Bangs -->
  <path d="M40 34 C44 24, 52 20, 60 20 C55 22, 48 26, 44 34Z" fill="#1a0a00"/>
  <path d="M80 34 C76 24, 68 20, 60 20 C65 22, 72 26, 76 34Z" fill="#1a0a00"/>
  <!-- Eyes - expressive -->
  <ellipse cx="50" cy="44" rx="3" ry="3" fill="#1a1a1a"/>
  <ellipse cx="70" cy="44" rx="3" ry="3" fill="#1a1a1a"/>
  <circle cx="51.2" cy="43" r="1.2" fill="white"/>
  <circle cx="71.2" cy="43" r="1.2" fill="white"/>
  <!-- Eyelashes -->
  <path d="M44 42 L43 40" stroke="#1a0a00" stroke-width="1" stroke-linecap="round"/>
  <path d="M76 42 L77 40" stroke="#1a0a00" stroke-width="1" stroke-linecap="round"/>
  <!-- Eyebrows - arched -->
  <path d="M44 38 Q50 35, 55 38" stroke="#1a0a00" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M65 38 Q70 35, 76 38" stroke="#1a0a00" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60 46 L58.5 52 Q60 53.5, 61.5 52 Z" fill="#e5c8a5" opacity="0.7"/>
  <!-- Mouth - friendly smile with lips -->
  <path d="M53 57 Q60 61, 67 57" stroke="#d4736a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M55 57 Q60 59, 65 57" fill="#e88080" opacity="0.4"/>
  <!-- Ears (hidden by hair mostly) -->
  <ellipse cx="38" cy="46" rx="2.5" ry="4.5" fill="#ecd0b0"/>
  <ellipse cx="82" cy="46" rx="2.5" ry="4.5" fill="#ecd0b0"/>
  <!-- Earrings -->
  <circle cx="37" cy="52" r="1.5" fill="#ff3030" opacity="0.6"/>
  <circle cx="83" cy="52" r="1.5" fill="#ff3030" opacity="0.6"/>
</svg>
