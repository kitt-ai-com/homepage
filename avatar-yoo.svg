  <path d="M52 57 Q60 62, 68 57" stroke="#c4836a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Glasses - CEO look -->
  <rect x="43" y="40" width="14" height="10" rx="3" stroke="#888" stroke-width="1.2" fill="none"/>
  <rect x="63" y="40" width="14" height="10" rx="3" stroke="#888" stroke-width="1.2" fill="none"/>
  <path d="M57 45 L63 45" stroke="#888" stroke-width="1"/>
  <!-- Ears -->
  <ellipse cx="37" cy="46" rx="3" ry="5" fill="#e8c4a0"/>
  <ellipse cx="83" cy="46" rx="3" ry="5" fill="#e8c4a0"/>
