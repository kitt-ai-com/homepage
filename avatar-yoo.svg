  <ellipse cx="50" cy="44" rx="3" ry="2.5" fill="#1a1a1a"/>
  <ellipse cx="70" cy="44" rx="3" ry="2.5" fill="#1a1a1a"/>
  <circle cx="51.2" cy="43.5" r="0.8" fill="white"/>
