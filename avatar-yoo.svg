  <path d="M38 42 C37 46, 37 48, 38 50 C39 47, 39 44, 38 42Z" fill="#2c2c2c"/>
  <path d="M82 42 C83 46, 83 48, 82 50 C81 47, 81 44, 82 42Z" fill="#2c2c2c"/>
