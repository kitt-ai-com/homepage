  <path d="M45 39 Q50 37, 54 39" stroke="#2c2c2c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M66 39 Q70 37, 75 39" stroke="#2c2c2c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
